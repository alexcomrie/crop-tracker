[build]
  # Specify the path to the PWA build output
  publish = "artifacts/cropmanager-pwa/dist"
  # Use pnpm to build the workspace
  command = "pnpm install && pnpm run build"

[[redirects]]
  # Redirect /api to the backend if needed, but the PWA mostly uses GAS
  # This matches the vite proxy setup
  from = "/api/*"
  to = "http://localhost:5001/api/:splat"
  status = 200

[[redirects]]
  # Single Page Application (SPA) redirect
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*.js"
  [headers.values]
    Content-Type = "application/javascript"

[[headers]]
  for = "/service-worker.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Service-Worker-Allowed = "/"
