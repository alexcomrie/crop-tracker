kind = "web"
previewPath = "/"
title = "CropManager PWA"
version = "1.0.0"
id = "artifacts/cropmanager-pwa"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 18430
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/cropmanager-pwa run dev"

[services.env]
PORT = "18430"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/cropmanager-pwa", "run", "build"]
publicDir = "artifacts/cropmanager-pwa/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
